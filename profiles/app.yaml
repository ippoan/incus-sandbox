# alc-app: Rust binary を動かす instance 用
# - src / target / cargo-cache device は up.sh が `incus config device add` で
#   instance ごとに足す (worktree パスや volume 名が動的に決まるため)
# - profile は環境変数だけ持つ
name: alc-app
description: incus-sandbox app profile (env only; volumes are added per-instance)
config:
  environment.RUST_LOG: info
  environment.CARGO_HOME: /root/.cargo
  environment.PATH: /root/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
devices: {}
