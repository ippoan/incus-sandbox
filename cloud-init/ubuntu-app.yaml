#cloud-config
# warm image (incus-dev-warm) 作成時に 1 度だけ走る。
# rust binary を実行する Incus instance のベースになる。
# rustup + 開発 / デバッグツール一式を入れた状態で snapshot される。

package_update: true
package_upgrade: false

packages:
  # build toolchain (cargo build をコンテナ内で走らせる用)
  - build-essential
  - pkg-config
  - libssl-dev
  - clang
  - lld
  # network / debug
  - ca-certificates
  - curl
  - wget
  - dnsutils
  - iputils-ping
  - net-tools
  - strace
  - ltrace
  - tcpdump
  - lsof
  # text / shell
  - vim
  - less
  - tmux
  - htop
  - jq
  - ripgrep
  - file
  - tree
  - unzip
  # postgres client (psql で postgres.incus を叩く用)
  - postgresql-client
  # systemd in container 必須
  - systemd
  - systemd-sysv
  - dbus
  # git (worktree のソースを Incus 内から見る場合に便利)
  - git
  # Rust toolchain installer
  - rustup
  # sccache: 全 worktree 横断 cache (warm image にバイナリを焼き込む)
  - sccache

runcmd:
  # rustup cache restore: 過去の warm image build で /cache/rustup に保存された
  # toolchain 一式があれば、/root/.rustup に複製してから rustup default stable を呼ぶ
  # (rustup は既にインストール済みと判定して download をスキップする)
  - |
    if [ -d /cache/rustup ] && [ -n "$(ls -A /cache/rustup 2>/dev/null)" ]; then
      mkdir -p /root/.rustup
      cp -a /cache/rustup/. /root/.rustup/
      echo "rustup cache restored from /cache/rustup"
    fi
  - |
    for i in 1 2 3; do
      HOME=/root rustup default stable && break
      echo "rustup default stable failed (attempt $i), retrying..."
      sleep 5
    done
  # cache write-back: 今回 download/install した toolchain を /cache/rustup に保存
  # (次回 warm image rebuild 時に上の restore で再利用される)
  - |
    mkdir -p /cache/rustup
    cp -a /root/.rustup/. /cache/rustup/ 2>/dev/null || true
  - |
    # apt 版 rustup の cargo/rustc proxy は /usr/bin/ にある (rustup が
    # /root/.cargo/bin/ を作らない設計)。CARGO_HOME はデータ置き場として
    # /root/.cargo を維持 (registry volume が /root/.cargo/registry に来る)。
    cat >/etc/profile.d/rust.sh <<'EOF'
    export CARGO_HOME=/root/.cargo
    export RUSTC_WRAPPER=sccache
    export SCCACHE_DIR=/sccache
    EOF
  - chmod 0644 /etc/profile.d/rust.sh
  # cloud-init 完了マーカー — cargo が呼べる時のみ touch
  - command -v cargo >/dev/null && touch /var/lib/incus-sandbox-warm-ready

write_files:
  - path: /etc/sysctl.d/90-incus-app.conf
    content: |
      # 開発用、特に厳しくしない
      net.ipv4.ip_forward=0
    permissions: '0644'

# locale
locale: C.UTF-8
timezone: Asia/Tokyo
