name: lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          shellcheck --version
          # bin/*.sh をすべて検査。_lib.sh は他から source される前提。
          shellcheck --severity=warning bin/*.sh

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pipx install yamllint
      - name: Run yamllint
        run: |
          yamllint --version
          yamllint -d "{extends: default, rules: {line-length: {max: 200}, document-start: disable, indentation: {spaces: 2, indent-sequences: consistent}, comments-indentation: disable, comments: {min-spaces-from-content: 1}}}" \
            cloud-init profiles units projects .github
